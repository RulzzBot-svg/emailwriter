<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 350px; height: 500px; margin: 0; padding: 16px; background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box; }
    * { box-sizing: border-box; }
    .header { background-color: #2563eb; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-weight: bold; text-align: center; font-size: 16px; }
    .label { font-size: 12px; color: #94a3b8; font-weight: bold; margin-bottom: 6px; display: block; }
    textarea { width: 100%; background-color: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 10px; font-size: 14px; color: white; outline: none; margin-bottom: 16px; font-family: inherit; resize: none; }
    textarea:focus { border-color: #3b82f6; }
    #rawInput { height: 100px; }
    #outputArea { height: 180px; margin-bottom: 12px; background-color: #0f172a; border-color: #334155; color: #cbd5e1; }
    button { width: 100%; font-weight: bold; padding: 10px; border-radius: 8px; border: none; cursor: pointer; transition: background-color 0.2s; font-family: inherit; font-size: 14px; }
    #generateBtn { background-color: #3b82f6; color: white; margin-bottom: 16px; }
    #generateBtn:hover { background-color: #2563eb; }
    #generateBtn:disabled { background-color: #475569; cursor: not-allowed; }
    #copyBtn { background-color: #334155; color: white; display: none; }
    #copyBtn.visible { display: block; }
    #copyBtn:hover { background-color: #475569; }
    #copyBtn.success { background-color: #10b981; }
  </style>
</head>
<body>
  <div class="header">✨ ProDraft</div>
  
  <label class="label">1. Raw Thoughts</label>
  <textarea id="rawInput" placeholder="e.g., tell john the report is late..."></textarea>
  
  <button id="generateBtn">Translate to Professional</button>
  
  <label class="label">2. Corporate Email</label>
  <textarea id="outputArea" readonly placeholder="Your corporate-approved email will appear here..."></textarea>
  
  <button id="copyBtn">Copy to Clipboard</button>
  
  <script src="popup.js"></script>
</body>
</html>
